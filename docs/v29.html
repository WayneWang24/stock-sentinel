<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>v29 策略表现 - Stock Sentinel</title>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
    <link rel="stylesheet" href="assets/style.css">
    <style>
        .kpi-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 15px;
            margin: 20px 0;
        }
        .kpi-card {
            background: var(--surface);
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .kpi-card .kpi-value {
            font-size: 2rem;
            font-weight: bold;
            color: #e94560;
        }
        .kpi-card .kpi-value.green { color: #cc2929; }
        .kpi-card .kpi-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-top: 5px;
        }
        .kpi-card .kpi-sub {
            color: var(--text-muted);
            font-size: 0.75rem;
            margin-top: 3px;
        }
        .chart-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin: 20px 0;
        }
        .chart-box {
            background: var(--surface);
            border-radius: 8px;
            padding: 15px;
        }
        .chart-box h3 {
            font-size: 1rem;
            margin-bottom: 10px;
            color: var(--text);
        }
        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
        }
        .compare-table th, .compare-table td {
            padding: 10px 15px;
            text-align: center;
            border-bottom: 1px solid #2a2a4a;
        }
        .compare-table th {
            background: var(--surface);
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        .compare-table td { font-size: 0.9rem; }
        .compare-table .highlight { color: #cc2929; font-weight: bold; }
        .disclaimer {
            background: var(--surface);
            border-radius: 8px;
            padding: 15px 20px;
            margin-top: 30px;
            font-size: 0.8rem;
            color: var(--text-muted);
            border-left: 3px solid #e94560;
        }
        @media (max-width: 768px) {
            .chart-row { grid-template-columns: 1fr; }
            .kpi-cards { grid-template-columns: 1fr 1fr; }
            .kpi-card .kpi-value { font-size: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>v29 极致确认策略</h1>
            <div class="header-meta">
                <span id="update-date">加载中...</span>
                <span class="sep">|</span>
                <a href="index.html">今日分析</a>
                <span class="sep">|</span>
                <a href="performance.html">策略追踪</a>
            </div>
        </header>

        <!-- 回测周期 -->
        <p id="backtest-info" class="muted" style="margin-top: 15px;"></p>

        <!-- KPI 卡片 -->
        <div class="kpi-cards" id="kpi-cards"></div>

        <!-- 方案对比表 -->
        <section class="section">
            <h2>止盈/止损方案对比</h2>
            <table class="compare-table" id="compare-table">
                <thead>
                    <tr>
                        <th>方案</th><th>交易笔数</th><th>止盈率</th>
                        <th>平均收益</th><th>平均持仓</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </section>

        <!-- 图表区 -->
        <div class="chart-row">
            <div class="chart-box">
                <h3>月度止盈率</h3>
                <div id="monthly-chart" style="height: 320px;"></div>
            </div>
            <div class="chart-box">
                <h3>确认漏斗</h3>
                <div id="funnel-chart" style="height: 320px;"></div>
            </div>
        </div>

        <div class="chart-row">
            <div class="chart-box">
                <h3>收益分布</h3>
                <div id="return-dist-chart" style="height: 320px;"></div>
            </div>
            <div class="chart-box">
                <h3>持仓天数分布</h3>
                <div id="hold-days-chart" style="height: 320px;"></div>
            </div>
        </div>

        <!-- 月度明细 -->
        <section class="section">
            <h2>月度明细</h2>
            <table class="data-table" id="monthly-table">
                <thead>
                    <tr>
                        <th style="text-align:left;">月份</th>
                        <th>交易笔数</th><th>止盈率</th><th>平均收益</th>
                    </tr>
                </thead>
                <tbody id="monthly-tbody"></tbody>
            </table>
        </section>

        <!-- 免责声明 -->
        <div class="disclaimer">
            <strong>免责声明：</strong>以上数据基于历史回测，不代表未来表现。
            回测结果可能存在过拟合风险，实际交易中可能因流动性、滑点、手续费等因素产生偏差。
            本页面仅供研究参考，不构成任何投资建议。投资有风险，入市需谨慎。
        </div>

        <footer>
            <p>由 Stock Sentinel 分析引擎生成 | 数据仅供参考</p>
            <p><a href="https://github.com/WayneWang24/stock-sentinel">GitHub</a></p>
        </footer>
    </div>

    <script>
    const ACCENT = '#e94560';
    const GREEN = '#cc2929';
    const BLUE = '#4a90d9';
    const MUTED = '#888';

    async function loadData() {
        try {
            const resp = await fetch('api/v29_performance.json');
            const data = await resp.json();
            renderKPI(data);
            renderCompareTable(data);
            renderMonthlyChart(data);
            renderFunnelChart(data);
            renderReturnDist(data);
            renderHoldDays(data);
            renderMonthlyTable(data);
            renderMeta(data);
        } catch (e) {
            console.error('加载数据失败:', e);
            document.getElementById('kpi-cards').innerHTML =
                '<p class="muted">数据加载失败，请稍后重试</p>';
        }
    }

    function renderMeta(data) {
        document.getElementById('update-date').textContent =
            '更新: ' + data.updated_at;
        const bp = data.backtest_period;
        document.getElementById('backtest-info').textContent =
            `回测周期: ${bp.start} ~ ${bp.end} (${bp.total_days} 个交易日)`;
    }

    function renderKPI(data) {
        const s = data.summary.TP10_SL5;
        const cards = [
            { label: '止盈率 (TP10/SL5)', value: (s.tp_rate * 100).toFixed(1) + '%', cls: 'green' },
            { label: '交易笔数', value: s.trades, cls: '' },
            { label: '平均收益', value: (s.avg_return * 100).toFixed(1) + '%', cls: 'green' },
            { label: '平均持仓天数', value: s.avg_hold_days + '天', cls: '' },
        ];
        const el = document.getElementById('kpi-cards');
        el.innerHTML = cards.map(c => `
            <div class="kpi-card">
                <div class="kpi-value ${c.cls}">${c.value}</div>
                <div class="kpi-label">${c.label}</div>
            </div>
        `).join('');
    }

    function renderCompareTable(data) {
        const tbody = document.querySelector('#compare-table tbody');
        const schemes = [
            { name: 'TP10 / SL5', key: 'TP10_SL5' },
            { name: 'TP8 / SL3', key: 'TP8_SL3' },
        ];
        tbody.innerHTML = schemes.map(sc => {
            const s = data.summary[sc.key];
            return `<tr>
                <td>${sc.name}</td>
                <td>${s.trades}</td>
                <td class="highlight">${(s.tp_rate * 100).toFixed(1)}%</td>
                <td class="${s.avg_return > 0 ? 'highlight' : ''}">${(s.avg_return * 100).toFixed(1)}%</td>
                <td>${s.avg_hold_days}天</td>
            </tr>`;
        }).join('');
    }

    function renderMonthlyChart(data) {
        const chart = echarts.init(document.getElementById('monthly-chart'));
        const months = data.monthly.map(m => m.month);
        const tpRates = data.monthly.map(m => (m.tp_rate * 100).toFixed(1));
        const trades = data.monthly.map(m => m.trades);

        chart.setOption({
            tooltip: {
                trigger: 'axis',
                axisPointer: { type: 'cross' },
                formatter: function(params) {
                    let s = params[0].axisValue + '<br/>';
                    params.forEach(p => {
                        const unit = p.seriesIndex === 0 ? '%' : '笔';
                        s += p.marker + p.seriesName + ': ' + p.value + unit + '<br/>';
                    });
                    return s;
                }
            },
            legend: { data: ['止盈率', '交易笔数'], textStyle: { color: MUTED } },
            xAxis: {
                type: 'category', data: months,
                axisLabel: { color: MUTED, rotate: 45, fontSize: 10 },
            },
            yAxis: [
                {
                    type: 'value', name: '止盈率(%)',
                    axisLabel: { color: MUTED, formatter: '{value}%' },
                    min: 0, max: 100,
                },
                {
                    type: 'value', name: '笔数',
                    axisLabel: { color: MUTED },
                },
            ],
            series: [
                {
                    name: '止盈率', type: 'line', smooth: true,
                    data: tpRates, yAxisIndex: 0,
                    lineStyle: { color: ACCENT, width: 2 },
                    itemStyle: { color: ACCENT },
                    areaStyle: { color: 'rgba(233,69,96,0.1)' },
                    markLine: {
                        silent: true,
                        data: [{ yAxis: 95, lineStyle: { color: GREEN, type: 'dashed' } }],
                        label: { formatter: '95%', color: GREEN },
                    },
                },
                {
                    name: '交易笔数', type: 'bar',
                    data: trades, yAxisIndex: 1,
                    itemStyle: { color: 'rgba(74,144,217,0.6)' },
                    barMaxWidth: 20,
                },
            ],
            grid: { left: '10%', right: '10%', bottom: '15%' },
            backgroundColor: 'transparent',
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function renderFunnelChart(data) {
        const chart = echarts.init(document.getElementById('funnel-chart'));
        const funnel = data.confirmation_funnel;

        chart.setOption({
            tooltip: {
                trigger: 'item',
                formatter: function(p) {
                    return p.name + '<br/>交易: ' + p.data.trades +
                        '笔<br/>止盈率: ' + (p.data.tp_rate * 100).toFixed(1) + '%';
                },
            },
            series: [{
                type: 'funnel',
                left: '10%', right: '10%', top: '5%', bottom: '5%',
                width: '80%',
                sort: 'descending',
                gap: 4,
                label: {
                    show: true,
                    position: 'inside',
                    formatter: function(p) {
                        return p.name + '\n' + p.data.trades + '笔 | ' +
                            (p.data.tp_rate * 100).toFixed(1) + '%';
                    },
                    fontSize: 12,
                    color: '#fff',
                },
                itemStyle: { borderWidth: 0 },
                data: funnel.map((f, i) => ({
                    name: f.stage,
                    value: f.trades,
                    trades: f.trades,
                    tp_rate: f.tp_rate,
                    itemStyle: {
                        color: [
                            'rgba(74,144,217,0.7)',
                            'rgba(233,69,96,0.7)',
                            'rgba(204,41,41,0.9)',
                        ][i],
                    },
                })),
            }],
            backgroundColor: 'transparent',
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function renderReturnDist(data) {
        const chart = echarts.init(document.getElementById('return-dist-chart'));
        const dist = data.return_distribution;

        chart.setOption({
            tooltip: { trigger: 'axis', formatter: '{b}: {c}笔' },
            xAxis: {
                type: 'category', data: dist.labels,
                axisLabel: { color: MUTED, fontSize: 10, rotate: 30 },
            },
            yAxis: {
                type: 'value', name: '笔数',
                axisLabel: { color: MUTED },
                minInterval: 1,
            },
            series: [{
                type: 'bar',
                data: dist.counts.map((c, i) => ({
                    value: c,
                    itemStyle: {
                        color: dist.labels[i].startsWith('-') ?
                            'rgba(0,184,148,0.8)' : 'rgba(204,41,41,0.8)',
                    },
                })),
                barMaxWidth: 40,
            }],
            grid: { left: '12%', right: '5%', bottom: '18%' },
            backgroundColor: 'transparent',
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function renderHoldDays(data) {
        const chart = echarts.init(document.getElementById('hold-days-chart'));
        const dist = data.hold_days_distribution;

        chart.setOption({
            tooltip: { trigger: 'axis', formatter: '{b}: {c}笔' },
            xAxis: {
                type: 'category', data: dist.days,
                axisLabel: { color: MUTED },
            },
            yAxis: {
                type: 'value', name: '笔数',
                axisLabel: { color: MUTED },
                minInterval: 1,
            },
            series: [{
                type: 'bar',
                data: dist.counts,
                itemStyle: { color: BLUE },
                barMaxWidth: 50,
                label: {
                    show: true, position: 'top',
                    color: MUTED, formatter: '{c}',
                },
            }],
            grid: { left: '12%', right: '5%', bottom: '10%' },
            backgroundColor: 'transparent',
        });
        window.addEventListener('resize', () => chart.resize());
    }

    function renderMonthlyTable(data) {
        const tbody = document.getElementById('monthly-tbody');
        tbody.innerHTML = data.monthly.map(m => `
            <tr>
                <td style="text-align:left;">${m.month}</td>
                <td>${m.trades}</td>
                <td style="color: ${m.tp_rate >= 0.95 ? GREEN : m.tp_rate >= 0.8 ? ACCENT : '#fff'}">
                    ${(m.tp_rate * 100).toFixed(1)}%
                </td>
                <td style="color: ${m.avg_return > 0 ? GREEN : 'inherit'}">
                    ${(m.avg_return * 100).toFixed(1)}%
                </td>
            </tr>
        `).join('');
    }

    loadData();
    </script>
</body>
</html>
